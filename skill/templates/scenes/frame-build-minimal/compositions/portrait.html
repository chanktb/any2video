<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=1080, height=1920" />
        <title>Build Minimal · Portrait 9:16</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /* frame-build-minimal — PORTRAIT 9:16 (1080×1920). See NOTICE for attribution. */
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                width: 1080px;
                height: 1920px;
                overflow: hidden;
                background: #020c1a;
            }
            #root {
                position: relative;
                width: 1080px;
                height: 1920px;
                background: #020c1a;
                color: #f5efe4;
                font-family: "Be Vietnam Pro", sans-serif;   /* full VN glyphs — Inter lacks precomposed Ạ/Ộ (dot detaches) */
            }

            .wash {
                position: absolute;
                inset: 0;
                z-index: 0;
                background:
                    radial-gradient(
                        ellipse 500px 560px at 54% 44%,
                        rgba(255, 150, 46, 0.09) 0%,
                        rgba(255, 120, 30, 0.04) 38%,
                        transparent 68%
                    ),
                    radial-gradient(
                        ellipse 360px 360px at 50% 42%,
                        rgba(255, 196, 120, 0.06) 0%,
                        transparent 60%
                    );
                opacity: 0;
                animation: washIn 1.4s ease-out forwards;
            }
            @keyframes washIn {
                to {
                    opacity: 1;
                }
            }

            .corner {
                position: absolute;
                z-index: 2;
                opacity: 0;
                animation: cornerIn 0.8s ease-out 0.2s forwards;
            }
            .corner-tl {
                top: 96px;
                left: 96px;
            }
            .corner-br {
                bottom: 96px;
                right: 96px;
                transform: rotate(180deg);
            }
            @keyframes cornerIn {
                to {
                    opacity: 1;
                }
            }

            .side-label {
                position: absolute;
                font-weight: 400;
                font-size: 16px;
                letter-spacing: 6px;
                text-transform: uppercase;
                color: #6f6a60;
                z-index: 2;
                opacity: 0;
                animation: fade 1s ease-out 1.8s forwards;
            }
            .side-left {
                left: 40px;
                top: 28%;
                transform: translateY(-50%) rotate(-90deg);
                transform-origin: center;
            }
            .side-right {
                right: 40px;
                top: 72%;
                transform: translateY(-50%) rotate(90deg);
                transform-origin: center;
            }
            @keyframes fade {
                to {
                    opacity: 1;
                }
            }

            .center {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                align-items: center;
                /* top-anchored (was justify-content:center → floated the hero low); spare space to the bottom */
                justify-content: flex-start;
                z-index: 1;
                padding: 360px 110px 60px;
            }
            .eyebrow {
                font-weight: 600;
                font-size: 22px;
                letter-spacing: 9px;
                text-transform: uppercase;
                color: #e0a258;
                text-shadow: 0 0 20px rgba(224, 162, 88, 0.45);
                margin-bottom: 48px;
                opacity: 0;
                animation: fadeUp 0.9s ease-out 0.5s forwards;
                text-align: center;
            }
            .hero {
                font-weight: 800;
                font-size: 195px;
                letter-spacing: -4px;
                line-height: 1.4;   /* VN stacked marks (Ầ Ổ) need real headroom; 1.0/1.24 still sliced the top */
                text-align: center;
                overflow: visible;
                padding-top: 0.06em;
                background: linear-gradient(135deg, #0097b2 0%, #7ed957 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                opacity: 0;
                transform: translateY(30px);
                animation: heroRise 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
            }
            @keyframes heroRise {
                to { opacity: 1; transform: translateY(0); }
            }
            .hero .ch {
                display: inline-block;
                overflow: visible;
                opacity: 0;
                transform: translateY(30px);
                animation: chReveal 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
                background: linear-gradient(135deg, #0097b2 0%, #7ed957 100%);
                -webkit-background-clip: text;
                background-clip: text;
                color: transparent;
                text-shadow: none;
            }
            @keyframes chReveal {
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .gold-line {
                width: 0;
                height: 2px;
                background: #f0a850;
                box-shadow: 0 0 16px rgba(240, 168, 80, 0.6);
                margin: 60px auto 52px;
                opacity: 0.9;
                animation: goldGrow 1s cubic-bezier(0.16, 1, 0.3, 1) 1.9s
                    forwards;
            }
            @keyframes goldGrow {
                to {
                    width: 96px;
                }
            }
            .desc {
                font-weight: 300;
                font-size: 34px;
                color: #c8c2b6;
                letter-spacing: 0.3px;
                line-height: 1.7;
                max-width: 860px;
                text-align: center;
                opacity: 0;
                animation: fadeUp 1s ease-out 2.2s forwards;
            }
            @keyframes fadeUp {
                0% {
                    opacity: 0;
                    transform: translateY(22px);
                }
                100% {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .indicators {
                position: absolute;
                bottom: 130px;
                left: 50%;
                transform: translateX(-50%);
                display: flex;
                gap: 30px;
                align-items: flex-end;
                z-index: 2;
            }
            .ind {
                width: 2px;
                background: #4a453c;
                transform: scaleY(0);
                transform-origin: bottom;
                animation:
                    indRise 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards,
                    breathe 4s ease-in-out 3s infinite;
            }
            .ind.gold {
                background: #f0a850;
                width: 2.5px;
                opacity: 0.9;
                box-shadow: 0 0 12px rgba(240, 168, 80, 0.6);
            }
            @keyframes indRise {
                to {
                    transform: scaleY(1);
                }
            }
            @keyframes breathe {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.45;
                }
            }

            /* .whisper decoration removed — was a template-author signature
             * (◇ diamond) with no semantic value for any2video content. */
        </style>
    </head>
    <body>
        <div
            id="root"
            data-composition-id="main"
            data-start="0"
            data-duration="5"
            data-width="1080"
            data-height="1920"
            data-composition-variables='{"eyebrow":"Đột Phá","hero":"Vượt trội","desc":"Nhanh hơn, gọn hơn, làm tốt đúng một việc.","side_left":"REPO","side_right":"OPEN SOURCE"}'
        >
            <div class="wash"></div>

            <svg
                class="corner corner-tl"
                width="26"
                height="26"
                viewBox="0 0 26 26"
                fill="none"
            >
                <path
                    d="M0 0L0 26"
                    stroke="#D4A574"
                    stroke-width="0.6"
                    opacity="0.45"
                />
                <path
                    d="M0 0L26 0"
                    stroke="#D4A574"
                    stroke-width="0.6"
                    opacity="0.45"
                />
            </svg>
            <svg
                class="corner corner-br"
                width="26"
                height="26"
                viewBox="0 0 26 26"
                fill="none"
            >
                <path
                    d="M0 0L0 26"
                    stroke="#D4A574"
                    stroke-width="0.6"
                    opacity="0.45"
                />
                <path
                    d="M0 0L26 0"
                    stroke="#D4A574"
                    stroke-width="0.6"
                    opacity="0.45"
                />
            </svg>

            <div class="side-label side-left"></div>
            <div class="side-label side-right"></div>

            <div class="center">
                <div class="eyebrow"></div>
                <div class="hero" id="hero"></div>
                <div class="gold-line"></div>
                <div class="desc"></div>
            </div>

            <div class="indicators">
                <div
                    class="ind"
                    style="height: 28px; animation-delay: 2.4s, 3s"
                ></div>
                <div
                    class="ind"
                    style="height: 40px; animation-delay: 2.46s, 3.1s"
                ></div>
                <div
                    class="ind gold"
                    style="height: 52px; animation-delay: 2.52s, 3.2s"
                ></div>
                <div
                    class="ind"
                    style="height: 34px; animation-delay: 2.58s, 3.3s"
                ></div>
                <div
                    class="ind"
                    style="height: 44px; animation-delay: 2.64s, 3.4s"
                ></div>
                <div
                    class="ind gold"
                    style="height: 56px; animation-delay: 2.7s, 3.5s"
                ></div>
                <div
                    class="ind"
                    style="height: 36px; animation-delay: 2.76s, 3.6s"
                ></div>
            </div>
        </div>

        <script>
            (function () {
                var v =
                    window.__hyperframes &&
                    typeof window.__hyperframes.getVariables === "function"
                        ? window.__hyperframes.getVariables()
                        : {};
                var set = function (sel, text) {
                    var el = document.querySelector(sel);
                    if (el && text != null) el.textContent = String(text);
                };
                set(".eyebrow", v.eyebrow);
                set(".desc", v.desc);
                set(".side-left", v.side_left);
                set(".side-right", v.side_right);
                var hero = document.getElementById("hero");
                if (hero && v.hero != null) {
                    hero.textContent = "";
                    // NFC-compose first so a Vietnamese below-dot (e.g. Ạ = A+U+0323 in
                    // NFD) isn't split into its own char span → an orphaned floating mark.
                    // Whole-word inline flow (NFC), NOT per-char inline-block spans: inline-block
                    // detaches VN below-dots (A-dot: Ạ Ộ Ợ) and slices stacked above-marks.
                    // Normal flow keeps every mark attached; the .hero block does the reveal.
                    hero.textContent = String(v.hero).normalize("NFC");

                    /* Auto-scale hero to fit AVAILABLE WIDTH. MUST run AFTER Google
                     * Fonts (Inter) load — measuring scrollWidth with system-ui fallback
                     * font (narrower than real Inter) causes undersized shrink → text
                     * overflows viewport once Inter arrives. Defer via document.fonts.ready. */
                    var doAutofit = function () {
                        var avail = 880;
                        var maxPx = 195, minPx = 56;
                        hero.style.whiteSpace = "nowrap";
                        hero.style.maxWidth = avail + "px";
                        hero.style.fontSize = maxPx + "px";
                        if (hero.scrollWidth > avail) {
                            var sized = Math.max(minPx, Math.floor(maxPx * avail / hero.scrollWidth) - 6);
                            hero.style.fontSize = sized + "px";
                        }
                    };
                    if (document.fonts && document.fonts.ready) {
                        document.fonts.ready.then(doAutofit);
                    } else {
                        setTimeout(doAutofit, 400);
                    }
                }
            })();
            window.__timelines = window.__timelines || {};
            window.__timelines["main"] = {
                pause: function () {},
                seek: function () {},
                paused: function () {
                    return true;
                },
            };
        </script>
    </body>
</html>
