<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>Media Full · Portrait 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-media-full — a USER-PROVIDED image or video shown FULL-BLEED (fills the
   * whole 9:16 frame, object-fit: cover). Like the repo-footage beat but from a
   * local/URL asset. Good for b-roll, a screen-recording, or a demo OUTPUT clip.
   * A still image gets a slow Ken Burns push so it's never static; a video
   * autoplays muted + loops (Playwright records it playing). Top + bottom scrims
   * keep an eyebrow/label and the burned karaoke line legible over any footage.
   * Does NOT obey the card safe-zone (it's real footage). INPUT-DRIVEN:
   * media / eyebrow / label. Portrait 9:16 (1080×1920).
   */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; background:#020c1a; }
  #root { position:relative; width:1080px; height:1920px; overflow:hidden;
    background:#020c1a; color:#fff; font-family:"Be Vietnam Pro", system-ui, sans-serif; }

  .media, .media > * { position:absolute; inset:0; width:100%; height:100%; z-index:1; }
  .media > * { object-fit:cover; display:block; }
  /* Ken Burns for a still image (class added by JS only for images) */
  @keyframes kb { from{transform:scale(1.04);} to{transform:scale(1.14);} }
  .media.img > img { animation: kb 12s ease-out both; transform-origin:50% 42%; }

  /* scrims so overlay text + burned karaoke stay readable over any footage */
  .topscrim { position:absolute; left:0; right:0; top:0; height:280px; z-index:3; pointer-events:none;
    background:linear-gradient(to bottom, rgba(2,8,20,0.85) 0%, rgba(2,8,20,0) 100%); }
  .botscrim { position:absolute; left:0; right:0; bottom:0; height:420px; z-index:3; pointer-events:none;
    background:linear-gradient(to top, rgba(2,8,20,0.92) 30%, rgba(2,8,20,0) 100%); }

  .eyebrow { position:absolute; top:104px; left:96px; right:96px; z-index:5;
    display:flex; align-items:center; gap:16px;
    font-size:28px; font-weight:700; letter-spacing:5px; text-transform:uppercase; color:#e8f4fd;
    text-shadow:0 2px 14px rgba(0,0,0,0.6); animation: fade 0.6s ease-out 0.2s both; }
  .eyebrow .dot { width:16px; height:16px; border-radius:50%; background:#fb7185; flex:none;
    box-shadow:0 0 14px rgba(251,113,133,0.8); }

  @keyframes fade { from{opacity:0;} to{opacity:1;} }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="8"
    data-width="1080"
    data-height="1920"
    data-composition-variables='{"media":"","eyebrow":"Output thật","label":""}'
  >
    <div class="media" id="media"></div>
    <div class="topscrim"></div>
    <div class="botscrim"></div>
    <div class="eyebrow"><span class="dot"></span><span class="etxt"></span></div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var set = function (sel, t) { var el = document.querySelector(sel);
        if (el && t != null) el.textContent = String(t).normalize("NFC"); };
      set(".eyebrow .etxt", v.eyebrow);

      var media = v.media || v.asset || v.src || "";
      var box = document.getElementById("media");
      if (box && media) {
        var isVid = /\.(mp4|webm|mov|m4v|ogv)(\?|#|$)/i.test(media)
          || (v.media_type || "").toLowerCase() === "video";
        var el;
        if (isVid) {
          el = document.createElement("video");
          el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true;
          el.setAttribute("muted", ""); el.setAttribute("autoplay", "");
          el.setAttribute("loop", ""); el.setAttribute("playsinline", "");
        } else {
          el = document.createElement("img"); el.alt = "";
          box.className = "media img";   // enable Ken Burns for stills
        }
        el.src = media;
        box.appendChild(el);
        if (isVid && el.play) { try { el.play(); } catch (e) {} }
      }
      var eb = document.querySelector(".eyebrow");
      if (eb && !(v.eyebrow || "").trim()) eb.style.display = "none";
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause:function(){}, seek:function(){}, paused:function(){return true;} };
  </script>
</body>
</html>
