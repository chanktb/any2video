<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Metric Bars · Portrait 9:16</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
    <style>
      /*
       * frame-metric-bars — horizontal PROGRESS bars (label · track/fill · value) that
       * grow left→right. Great for scores / percentages / a small comparison. One row
       * can be highlighted (hl). Pure CSS. Slots: kicker, title, accent, items:[{label,
       * value(0-100 or with %), display(optional right text), hl}], note.
       */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #120a06; }
      #root {
        position: relative; width: 1080px; height: 1920px; overflow: hidden;
        background:
          radial-gradient(ellipse 720px 600px at 84% 8%, rgba(249, 115, 22, 0.12), transparent 60%),
          radial-gradient(ellipse 640px 620px at 6% 94%, rgba(251, 191, 36, 0.10), transparent 62%),
          #120a06;
        color: #fbf3e8; font-family: "Be Vietnam Pro", sans-serif;
      }
      .head { position: absolute; left: 96px; right: 96px; top: 300px; z-index: 2; }
      .kicker { font-size: 25px; font-weight: 700; letter-spacing: 7px; text-transform: uppercase; color: #f6a94a; opacity: 0; animation: fadeUp 0.7s ease-out 0.15s forwards; }
      .title { margin-top: 22px; font-size: 80px; font-weight: 800; line-height: 1.16; letter-spacing: -1.5px; opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; }
      .title .accent { background: linear-gradient(96deg, #fbbf24 0%, #f97316 100%); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1.4; padding-top: 0.14em; overflow: visible; display: inline-block; }

      .rows { position: absolute; left: 96px; right: 96px; top: 680px; z-index: 2; display: flex; flex-direction: column; gap: 46px; }
      .row { opacity: 0; animation: fadeUp 0.6s ease-out forwards; }
      .rhead { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 20px; }
      .rlabel { font-size: 38px; font-weight: 600; color: #eaddcc; padding-top: 0.06em; }
      .row.hl .rlabel { color: #fff5e8; font-weight: 700; }
      .rval { font-family: "Space Grotesk", "Be Vietnam Pro", sans-serif; font-size: 40px; font-weight: 700; color: #c99a63; white-space: nowrap; }
      .row.hl .rval { color: #ffcf8a; }
      .track { height: 30px; border-radius: 15px; background: rgba(255,255,255,0.07); overflow: hidden; }
      .fill { height: 100%; width: 0; border-radius: 15px; background: linear-gradient(90deg, #6b5540, #7a5a38); }
      .row.hl .fill { background: linear-gradient(90deg, #fbbf24, #f97316); box-shadow: 0 0 34px rgba(249,115,22,0.5); }
      @keyframes grow { to { width: var(--w); } }

      .note { position: absolute; left: 96px; right: 96px; top: 1400px; z-index: 2; font-size: 30px; font-weight: 400; line-height: 1.45; color: #a89478;
        opacity: 0; animation: fadeUp 0.8s ease-out 1.15s forwards; }

      @keyframes fadeUp { 0% { opacity: 0; transform: translateY(24px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920"
      data-composition-variables='{"kicker":"ĐIỂM CHẤT LƯỢNG","title":"Sẵn sàng cho","accent":"AI Agent","items":[{"label":"Ngữ cảnh nghiệp vụ","value":"92","display":"92%","hl":true},{"label":"Tối ưu token","value":"88","display":"88%"},{"label":"Chuẩn hoá exit code","value":"95","display":"95%"},{"label":"Wrapper thường","value":"34","display":"34%"}],"note":"Điểm đánh giá tự động, càng cao càng hợp để AI gọi hàng nghìn lần."}'
    >
      <div class="head">
        <div class="kicker"></div>
        <div class="title"></div>
      </div>
      <div class="rows"></div>
      <div class="note"></div>
    </div>

    <script>
      (function () {
        var v =
          window.__hyperframes &&
          typeof window.__hyperframes.getVariables === "function"
            ? window.__hyperframes.getVariables()
            : {};
        var set = function (sel, text) { var el = document.querySelector(sel); if (el && text != null) el.textContent = String(text).normalize("NFC"); };
        set(".kicker", v.kicker);
        set(".note", v.note);

        var titleEl = document.querySelector(".title");
        if (titleEl) {
          var t = v.title != null ? String(v.title).normalize("NFC") : "";
          var acc = v.accent != null ? String(v.accent).normalize("NFC") : "";
          titleEl.textContent = ""; titleEl.appendChild(document.createTextNode(acc ? t + " " : t));
          if (acc) { var s = document.createElement("span"); s.className = "accent"; s.textContent = acc; titleEl.appendChild(s); }
        }

        var items = Array.isArray(v.items) ? v.items.slice(0, 5) : [];
        var rows = document.querySelector(".rows");
        items.forEach(function (it, i) {
          it = it || {};
          var pct = Math.max(3, Math.min(100, parseFloat(String(it.value).replace(/[^0-9.]/g, "")) || 0));
          var row = document.createElement("div");
          row.className = "row" + (it.hl ? " hl" : "");
          row.style.animationDelay = (0.45 + i * 0.12) + "s";
          var rh = document.createElement("div"); rh.className = "rhead";
          var rl = document.createElement("div"); rl.className = "rlabel"; rl.textContent = it.label != null ? String(it.label).normalize("NFC") : "";
          var rv = document.createElement("div"); rv.className = "rval num"; rv.textContent = it.display != null ? String(it.display) : (pct + "%");
          rh.appendChild(rl); rh.appendChild(rv);
          var track = document.createElement("div"); track.className = "track";
          var fill = document.createElement("div"); fill.className = "fill";
          fill.style.setProperty("--w", pct + "%");
          fill.style.animation = "grow 1.05s cubic-bezier(0.16,1,0.3,1) " + (0.6 + i * 0.12) + "s forwards";
          track.appendChild(fill);
          row.appendChild(rh); row.appendChild(track);
          rows.appendChild(row);
        });
      })();
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
    </script>
  </body>
</html>
