<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Feature Grid · Portrait 9:16</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
      /*
       * frame-feature-grid — a 2×2 grid of FEATURE cards, each with an inline-SVG icon
       * (built-in set, no external image), a title and a short desc. Slots: kicker,
       * title, accent, features:[{icon,title,desc}] (2-4), note. icon keys: bolt lock
       * sync search chart code cloud layers database link globe cpu check doc.
       */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #04120f; }
      #root {
        position: relative; width: 1080px; height: 1920px; overflow: hidden;
        background:
          radial-gradient(ellipse 740px 620px at 84% 8%, rgba(45, 212, 191, 0.13), transparent 60%),
          radial-gradient(ellipse 640px 640px at 6% 94%, rgba(52, 211, 153, 0.11), transparent 62%),
          #04120f;
        color: #e9fbf4; font-family: "Be Vietnam Pro", sans-serif;
      }
      .head { position: absolute; left: 96px; right: 96px; top: 300px; z-index: 2; }
      .kicker { font-size: 25px; font-weight: 700; letter-spacing: 7px; text-transform: uppercase; color: #4fddb4; opacity: 0; animation: fadeUp 0.7s ease-out 0.15s forwards; }
      .title { margin-top: 22px; font-size: 80px; font-weight: 800; line-height: 1.16; letter-spacing: -1.5px; opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards; }
      .title .accent { background: linear-gradient(96deg, #2dd4bf 0%, #34d399 100%); -webkit-background-clip: text; background-clip: text; color: transparent; line-height: 1.4; padding-top: 0.14em; overflow: visible; display: inline-block; }

      /* grid + note FLOW inside .lower so the note always sits BELOW the grid
       * (margin, not a fixed top), never overlapping when cells grow to 2 lines. */
      .lower { position: absolute; left: 96px; right: 96px; top: 596px; z-index: 2; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
      .card {
        border-radius: 32px; padding: 40px 40px;
        background: linear-gradient(160deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        border: 1px solid rgba(255,255,255,0.09);
        box-shadow: 0 22px 54px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.05);
        opacity: 0; animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
      }
      .ic {
        width: 92px; height: 92px; border-radius: 24px; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(150deg, rgba(45,212,191,0.22), rgba(52,211,153,0.10));
        border: 1px solid rgba(52,211,153,0.32); margin-bottom: 28px;
      }
      .ic svg { width: 48px; height: 48px; stroke: #67e8c4; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round; }
      .ic svg .fill { fill: #67e8c4; stroke: none; }
      .ftitle { font-size: 42px; font-weight: 700; line-height: 1.2; color: #eafcf5; padding-top: 0.04em; }
      .fdesc { margin-top: 10px; font-size: 28px; font-weight: 400; line-height: 1.38; color: #8fc4b6; }
      @keyframes cardIn { 0% { opacity: 0; transform: translateY(28px) scale(0.97); } 100% { opacity: 1; transform: translateY(0) scale(1); } }

      .note { margin-top: 42px; font-size: 30px; font-weight: 400; line-height: 1.45; color: #7fae9f;
        opacity: 0; animation: fadeUp 0.8s ease-out 1.2s forwards; }

      @keyframes fadeUp { 0% { opacity: 0; transform: translateY(24px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920"
      data-composition-variables='{"kicker":"THIẾT KẾ CHO AI","title":"Agent-native","accent":"tận gốc","features":[{"icon":"bolt","title":"Ít token","desc":"Cờ compact cắt 60-80% dữ liệu thừa"},{"icon":"sync","title":"Đồng bộ local","desc":"SQLite, tra tại chỗ vài mili giây"},{"icon":"code","title":"Ra JSON","desc":"Tự đổi sang JSON khi pipe, khỏi cờ"},{"icon":"check","title":"Exit code chuẩn","desc":"AI tự biết lỗi gì mà sửa"}],"note":"Nhờ vậy AI gọi CLI hàng nghìn lần vẫn rẻ và ổn định."}'
    >
      <div class="head">
        <div class="kicker"></div>
        <div class="title"></div>
      </div>
      <div class="lower">
        <div class="grid"></div>
        <div class="note"></div>
      </div>
    </div>

    <script>
      (function () {
        var v =
          window.__hyperframes &&
          typeof window.__hyperframes.getVariables === "function"
            ? window.__hyperframes.getVariables()
            : {};
        var set = function (sel, text) { var el = document.querySelector(sel); if (el && text != null) el.textContent = String(text).normalize("NFC"); };
        set(".kicker", v.kicker);
        set(".note", v.note);

        var titleEl = document.querySelector(".title");
        if (titleEl) {
          var t = v.title != null ? String(v.title).normalize("NFC") : "";
          var acc = v.accent != null ? String(v.accent).normalize("NFC") : "";
          titleEl.textContent = ""; titleEl.appendChild(document.createTextNode(acc ? t + " " : t));
          if (acc) { var s = document.createElement("span"); s.className = "accent"; s.textContent = acc; titleEl.appendChild(s); }
        }

        var ICONS = {
          bolt: '<path class="fill" d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z"/>',
          lock: '<rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/>',
          sync: '<path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M3 21v-5h5"/>',
          search: '<circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/>',
          chart: '<path d="M4 20V4"/><path d="M4 20h16"/><rect class="fill" x="7" y="12" width="3.4" height="6" rx="1"/><rect class="fill" x="12.5" y="8" width="3.4" height="10" rx="1"/><rect class="fill" x="18" y="5" width="3.4" height="13" rx="1"/>',
          code: '<path d="M8 6l-5 6 5 6"/><path d="M16 6l5 6-5 6"/>',
          cloud: '<path d="M6.5 18a4.5 4.5 0 0 1 .3-9A6 6 0 0 1 18 9.5a3.5 3.5 0 0 1-.5 8.5H6.5Z"/>',
          layers: '<path d="M12 3 3 8l9 5 9-5-9-5Z"/><path d="M3 13l9 5 9-5"/>',
          database: '<ellipse cx="12" cy="6" rx="8" ry="3.2"/><path d="M4 6v12c0 1.8 3.6 3.2 8 3.2s8-1.4 8-3.2V6"/><path d="M4 12c0 1.8 3.6 3.2 8 3.2s8-1.4 8-3.2"/>',
          link: '<path d="M9 15l6-6"/><path d="M10.5 6.5 12 5a4 4 0 0 1 6 6l-1.5 1.5"/><path d="M13.5 17.5 12 19a4 4 0 0 1-6-6l1.5-1.5"/>',
          globe: '<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c3 3.5 3 14.5 0 18M12 3c-3 3.5-3 14.5 0 18"/>',
          cpu: '<rect x="7" y="7" width="10" height="10" rx="2"/><path d="M10 2v3M14 2v3M10 19v3M14 19v3M2 10h3M2 14h3M19 10h3M19 14h3"/>',
          check: '<path d="M4 12.5 9.5 18 20 6"/>',
          doc: '<path d="M7 3h7l4 4v14H7z"/><path d="M14 3v4h4"/><path d="M10 13h5M10 17h5"/>',
          rocket: '<path d="M12 3c3.5 2 5 6 5 9l-3 3-4-4 3-8Z" transform="translate(-1 0)"/><path d="M9 15l-3 3 3-1z"/>',
        };

        var features = Array.isArray(v.features) ? v.features.slice(0, 4) : [];
        var grid = document.querySelector(".grid");
        features.forEach(function (it, i) {
          it = it || {};
          var card = document.createElement("div"); card.className = "card";
          card.style.animationDelay = (0.4 + i * 0.11) + "s";
          var ic = document.createElement("div"); ic.className = "ic";
          var key = (it.icon || "check").toLowerCase();
          ic.innerHTML = '<svg viewBox="0 0 24 24">' + (ICONS[key] || '<circle class="fill" cx="12" cy="12" r="5"/>') + '</svg>';
          var ft = document.createElement("div"); ft.className = "ftitle"; ft.textContent = it.title != null ? String(it.title).normalize("NFC") : "";
          card.appendChild(ic); card.appendChild(ft);
          if (it.desc != null && String(it.desc).trim()) {
            var fd = document.createElement("div"); fd.className = "fdesc"; fd.textContent = String(it.desc).normalize("NFC");
            card.appendChild(fd);
          }
          grid.appendChild(card);
        });
      })();
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
    </script>
  </body>
</html>
