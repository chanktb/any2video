<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>Media Card · Portrait 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-media-card — a USER-PROVIDED image or video shown INSIDE a designed dark
   * card (rounded, subtle border + glow), top-anchored, with an eyebrow + label.
   * Good for a screenshot / product photo / diagram / logo — the whole asset is
   * visible (object-fit: contain). The `media` slot auto-detects image vs video by
   * extension; a video autoplays muted + loops (Playwright records it playing).
   * Karaoke caption is burned at compose — no caption band here. INPUT-DRIVEN:
   * media / eyebrow / label / category. Portrait 9:16 (1080×1920).
   */
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:1080px; height:1920px; overflow:hidden; background:#020c1a; }
  #root { position:relative; width:1080px; height:1920px; overflow:hidden;
    background:#020c1a; color:#f4f7fb; font-family:"Be Vietnam Pro", system-ui, sans-serif; }
  .blob { position:absolute; border-radius:50%; mix-blend-mode:screen; filter:blur(130px); z-index:0; opacity:0.45; }
  @keyframes fl1 { 0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(60px,-40px) scale(1.1);} }
  .b1 { width:520px; height:520px; background:#0e7490; top:-120px; right:-140px; animation:fl1 13s ease-in-out infinite; }
  .b2 { width:440px; height:440px; background:#4338ca; bottom:-140px; left:-120px; animation:fl1 16s ease-in-out infinite; }

  .eyebrow { position:absolute; top:150px; left:96px; right:96px; z-index:10; text-align:center;
    font-size:30px; font-weight:700; letter-spacing:8px; text-transform:uppercase; color:#7ec8e3;
    animation: fadeUp 0.6s ease-out 0.2s both; }

  /* framed media — TOP-ANCHORED (never centered/low), whole asset visible */
  .frame { position:absolute; left:50%; top:260px; transform:translateX(-50%); z-index:10;
    width:892px; height:1180px; border-radius:26px; overflow:hidden;
    background:#0a1424; border:1.5px solid rgba(255,255,255,0.14);
    box-shadow:0 24px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(94,225,230,0.08) inset;
    animation: pop 0.7s cubic-bezier(0.16,1,0.3,1) 0.35s both; display:grid; place-items:center; }
  .frame > * { width:100%; height:100%; object-fit:contain; display:block; }
  @keyframes pop { 0%{opacity:0;transform:translateX(-50%) scale(.94);} 100%{opacity:1;transform:translateX(-50%) scale(1);} }

  @keyframes fadeUp { from{opacity:0;transform:translateY(24px);} to{opacity:1;transform:translateY(0);} }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="6"
    data-width="1080"
    data-height="1920"
    data-composition-variables='{"media":"","eyebrow":"Xem tận mắt","label":"Mô tả ngắn cho ảnh/clip này.","category":"DEMO"}'
  >
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="eyebrow"></div>
    <div class="frame" id="frame"></div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes && typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};
      var set = function (sel, t) { var el = document.querySelector(sel);
        if (el && t != null) el.textContent = String(t).normalize("NFC"); };
      set(".eyebrow", v.eyebrow);

      var media = v.media || v.asset || v.src || "";
      var frame = document.getElementById("frame");
      if (frame && media) {
        var isVid = /\.(mp4|webm|mov|m4v|ogv)(\?|#|$)/i.test(media)
          || (v.media_type || "").toLowerCase() === "video";
        var el;
        if (isVid) {
          el = document.createElement("video");
          el.muted = true; el.autoplay = true; el.loop = true; el.playsInline = true;
          el.setAttribute("muted", ""); el.setAttribute("autoplay", "");
          el.setAttribute("loop", ""); el.setAttribute("playsinline", "");
        } else {
          el = document.createElement("img");
          el.alt = "";
        }
        el.src = media;
        frame.appendChild(el);
        if (isVid && el.play) { try { el.play(); } catch (e) {} }
      }
      var eb = document.querySelector(".eyebrow");
      if (eb && !(eb.textContent || "").trim()) eb.style.display = "none";
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause:function(){}, seek:function(){}, paused:function(){return true;} };
  </script>
</body>
</html>
