<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1080, height=1920" />
<title>AI Coding List · Portrait 9:16</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /*
   * frame-aicoding-list — original template for this repo. A dark, glossy
   * "impact / comparison list": warm gradient glow on a near-black canvas, a big
   * title with a gradient accent word + subtitle, then a stack of rounded item
   * cards (coloured icon chip + title/desc + a coloured right-hand tag) whose
   * accent colour is driven by each item's `level`. Be Vietnam Pro covers
   * Vietnamese. See NOTICE. Portrait 9:16 (1080×1920).
   */
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1080px; height: 1920px; overflow: hidden; }
  #root { position: relative; width: 1080px; height: 1920px; background: #08080f; color: #f4f5fb;
    font-family: 'Be Vietnam Pro', sans-serif; overflow: hidden; }

  /* warm gradient glow (top-left) + cool counter-glow + faint grid */
  .bg { position: absolute; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(900px 720px at 14% 8%, rgba(255,86,34,0.22) 0%, transparent 52%),
      radial-gradient(780px 700px at 92% 18%, rgba(120,60,255,0.14) 0%, transparent 55%),
      radial-gradient(1000px 900px at 50% 108%, rgba(40,120,255,0.10) 0%, transparent 60%); }
  .grid { position: absolute; inset: 0; z-index: 1; pointer-events: none; opacity: 0.5;
    background-image: linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 60px 60px; mask-image: radial-gradient(circle at 50% 40%, #000 0%, transparent 80%); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(26px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes wave { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

  /* header + list flow in one top-anchored stack, so a 2-line title pushes the
     list DOWN instead of overlapping it (absolute head/list overlapped when the
     title wrapped). */
  .stack { position: absolute; left: 96px; right: 96px; top: 360px; z-index: 4; }
  .head { text-align: center; }
  .title { font-weight: 800; font-size: 92px; line-height: 1.22; letter-spacing: -2px;
    opacity: 0; animation: fadeDown 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s both; }
  /* Accent word/phrase always drops to its OWN centered line (clean "TITLE\nACCENT"). */
  .title .accent { display: block; background: linear-gradient(92deg, #ff9a3d 0%, #ff5a2c 45%, #ff2d55 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    line-height: 1.4; padding-top: 0.18em; overflow: visible; }
  .subtitle { margin-top: 22px; font-size: 32px; font-weight: 500; color: rgba(244,245,251,0.55);
    opacity: 0; animation: fadeDown 0.8s ease-out 0.4s both; }

  /* list */
  .list { margin-top: 56px; display: flex; flex-direction: column; gap: 22px; }
  .item { position: relative; display: flex; align-items: center; gap: 28px; padding: 30px 36px;
    border-radius: 30px; background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.09);
    box-shadow: 0 24px 60px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
    opacity: 0; transform: translateY(26px); animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
    --c: #ffb020; --cbg: rgba(255,176,32,0.14); --cbd: rgba(255,176,32,0.42); }
  .item::before { content: ''; position: absolute; left: 0; top: 22px; bottom: 22px; width: 6px;
    border-radius: 0 6px 6px 0; background: var(--c); box-shadow: 0 0 24px var(--c); opacity: 0.9; }
  /* Hide the left color stripe in numbered-circle mode — the circle IS the marker. */
  .item.is-num::before { display: none; }
  .item.lv-danger { --c: #ff4d5e; --cbg: rgba(255,77,94,0.15); --cbd: rgba(255,77,94,0.45); }
  .item.lv-warn   { --c: #ffb020; --cbg: rgba(255,176,32,0.15); --cbd: rgba(255,176,32,0.45); }
  .item.lv-good   { --c: #2ee6a0; --cbg: rgba(46,230,160,0.15); --cbd: rgba(46,230,160,0.45); }
  .item.lv-info   { --c: #45a6ff; --cbg: rgba(69,166,255,0.15); --cbd: rgba(69,166,255,0.45); }

  .chip { flex: 0 0 auto; width: 84px; height: 84px; border-radius: 22px; display: flex; align-items: center; justify-content: center;
    font-size: 40px; background: var(--cbg); border: 1px solid var(--cbd); }
  /* Numbered-circle variant (numbered variant): pass numberStyle:"circle" in inputs */
  .chip.is-num { border-radius: 50%; font-weight: 800; font-size: 46px; color: var(--c);
    background: rgba(0,0,0,0.35); border: 2px solid var(--c);
    box-shadow: 0 0 28px var(--cbd), inset 0 0 12px rgba(0,0,0,0.4);
    text-shadow: 0 0 18px var(--cbd); }
  .body { flex: 1 1 auto; min-width: 0; }
  .it-title { font-weight: 700; font-size: 36px; line-height: 1.28; color: #f4f5fb; }
  .it-desc { margin-top: 8px; font-size: 23px; font-weight: 400; color: rgba(244,245,251,0.5); line-height: 1.45; }
  .tag { flex: 0 0 auto; margin-left: 20px; font-weight: 800; font-size: 36px; letter-spacing: 1px; color: var(--c);
    text-shadow: 0 0 28px var(--cbd); }
</style>
</head>
<body>
  <div
    id="root"
    data-composition-id="main"
    data-start="0"
    data-duration="5"
    data-width="1080"
    data-height="1920"
    data-composition-variables='{"title":"Ai đang bị ","accent":"tác động","subtitle":"Từ nền tảng cũ đến chuẩn hoá bằng AI","items":[{"icon":"🚫","title":"Khoá học đại trà","desc":"Tác động rất cao / người học chuyển sang AI","tag":"Nguy","level":"danger"},{"icon":"⚠️","title":"LMS truyền thống","desc":"42% doanh nghiệp đang thay thế","tag":"Cao","level":"warn"},{"icon":"⚠️","title":"Gia công nội dung","desc":"AI tự tạo nội dung, giảm nhu cầu","tag":"Cao","level":"warn"},{"icon":"✅","title":"Nền tảng AI-native","desc":"Hưởng lợi ngược / tăng 33.8%","tag":"Lợi","level":"good"}]}'
  >
    <div class="bg"></div>
    <div class="grid"></div>

    <div class="stack">
      <div class="head">
        <h1 class="title"></h1>
        <div class="subtitle"></div>
      </div>
      <div class="list"></div>
    </div>
  </div>

  <script>
    (function () {
      var v = (window.__hyperframes &&
               typeof window.__hyperframes.getVariables === "function")
        ? window.__hyperframes.getVariables() : {};

      // Title with an optional gradient accent word/phrase.
      var titleEl = document.querySelector(".title");
      var title = v.title != null ? String(v.title) : "";
      var accent = v.accent != null ? String(v.accent) : "";
      if (titleEl) {
        titleEl.textContent = "";
        // Guarantee a space between title and the accent phrase so they never
        // stick together (e.g. "tự thiết kế" + "HTML CSS" → "tự thiết kếHTML CSS").
        var _needSp = title && accent && !/\s$/.test(title) && !/^\s/.test(accent);
        titleEl.appendChild(document.createTextNode(_needSp ? title + " " : title));
        if (accent) {
          var s = document.createElement("span");
          s.className = "accent";
          s.textContent = accent;
          // Optional Claude-chosen gradient (else the CSS orange→red default).
          if (v.accent_from && v.accent_to) {
            s.style.backgroundImage =
              "linear-gradient(92deg, " + v.accent_from + " 0%, " + v.accent_to + " 100%)";
          }
          titleEl.appendChild(s);
        }
      }
      var sub = document.querySelector(".subtitle");
      if (sub && v.subtitle != null) sub.textContent = String(v.subtitle);

      // Item cards.
      var levels = { danger: 1, warn: 1, good: 1, info: 1 };
      var list = document.querySelector(".list");
      var items = Array.isArray(v.items) ? v.items : [];
      var useNumbered = v.numberStyle === "circle";
      items.slice(0, 5).forEach(function (it, i) {
        it = it || {};
        var lvl = it.level && levels[it.level] ? it.level : "warn";
        var card = document.createElement("div");
        card.className = "item lv-" + lvl + (useNumbered ? " is-num" : "");
        // Reveal timing (beat-split): use it.reveal_at_sec if present, else fallback
        // to CSS stagger. `both` fill mode keeps item invisible until delay elapses.
        var revealAt = (it.reveal_at_sec != null) ? Number(it.reveal_at_sec) : (0.5 + i * 0.12);
        var wD = (1.5 + i * 0.35).toFixed(2);
        card.style.animation = "fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) " + revealAt.toFixed(2) + "s both, wave 2.8s ease-in-out " + wD + "s infinite";
        card.setAttribute("data-reveal-at", revealAt.toFixed(2));

        var chip = document.createElement("div");
        if (useNumbered) {
          chip.className = "chip is-num";
          chip.textContent = String(i + 1);
        } else {
          chip.className = "chip";
          chip.textContent = it.icon != null ? String(it.icon) : "";
        }

        var body = document.createElement("div");
        body.className = "body";
        var t = document.createElement("div");
        t.className = "it-title";
        t.textContent = it.title != null ? String(it.title) : "";
        var d = document.createElement("div");
        d.className = "it-desc";
        d.textContent = it.desc != null ? String(it.desc) : "";
        body.appendChild(t);
        body.appendChild(d);

        var tag = document.createElement("div");
        tag.className = "tag";
        tag.textContent = it.tag != null ? String(it.tag) : "";

        card.appendChild(chip);
        card.appendChild(body);
        card.appendChild(tag);
        list.appendChild(card);
      });
    })();
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = { pause: function () {}, seek: function () {}, paused: function () { return true; } };
  </script>
</body>
</html>
