<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <title>Bar Chart · Portrait 9:16</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
      /*
       * frame-bar-chart — a vertical BAR CHART scene (1080×1920). Data-driven from
       * `items:[{label,value,hl}]`; bars grow from 0, the value labels count up, one
       * bar is highlighted in the accent gradient. Pure CSS/DOM — no external image,
       * no chart lib. Top-anchored; VN-diacritic-safe headroom on the title accent.
       * Slots: kicker, title, accent, unit(optional suffix on values), items[].
       */
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #060e1c; }
      #root {
        position: relative; width: 1080px; height: 1920px; overflow: hidden;
        background:
          radial-gradient(ellipse 720px 620px at 78% 12%, rgba(34, 211, 238, 0.10), transparent 60%),
          radial-gradient(ellipse 640px 640px at 8% 90%, rgba(59, 130, 246, 0.10), transparent 62%),
          #060e1c;
        color: #eaf2fb; font-family: "Be Vietnam Pro", sans-serif;
      }

      .head { position: absolute; left: 96px; right: 96px; top: 300px; z-index: 2; }
      .kicker {
        font-size: 25px; font-weight: 700; letter-spacing: 7px; text-transform: uppercase;
        color: #58c7e6; opacity: 0; animation: fadeUp 0.7s ease-out 0.15s forwards;
      }
      .title {
        margin-top: 22px; font-size: 82px; font-weight: 800; line-height: 1.16;
        letter-spacing: -1.5px; opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
      }
      .title .accent {
        background: linear-gradient(96deg, #22d3ee 0%, #3b82f6 100%);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        line-height: 1.4; padding-top: 0.14em; overflow: visible; display: inline-block;
      }

      .plot {
        position: absolute; left: 96px; right: 96px; top: 690px; height: 620px; z-index: 2;
        display: flex; align-items: flex-end; gap: 30px;
      }
      .baseline {
        position: absolute; left: 96px; right: 96px; top: 1310px; height: 2px; z-index: 2;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.22), transparent);
      }
      .col { flex: 1; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; }
      .val {
        font-family: "Space Grotesk", "Be Vietnam Pro", sans-serif;
        font-size: 40px; font-weight: 700; margin-bottom: 16px; color: #cfe0f2; white-space: nowrap;
      }
      .col.hl .val { color: #eaf7ff; }
      .bar {
        width: 100%; max-width: 128px; border-radius: 18px 18px 3px 3px;
        background: linear-gradient(180deg, #223651, #16233a);
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        transform: scaleY(0); transform-origin: bottom;
        animation: barGrow 1s cubic-bezier(0.16,1,0.3,1) 0.55s forwards;
      }
      .col.hl .bar {
        background: linear-gradient(180deg, #34e0f5 0%, #2f7ff2 100%);
        box-shadow: 0 0 44px rgba(45, 176, 240, 0.5), inset 0 1px 0 rgba(255,255,255,0.25);
      }
      @keyframes barGrow { to { transform: scaleY(1); } }

      .cats {
        position: absolute; left: 96px; right: 96px; top: 1330px; z-index: 2;
        display: flex; gap: 30px;
      }
      .cat {
        flex: 1; text-align: center; font-size: 27px; font-weight: 500; line-height: 1.25;
        color: #93a6bd; padding-top: 0.1em;
        opacity: 0; animation: fadeUp 0.7s ease-out 1.1s forwards;
      }
      .col.hl + .cat, .cat.hl { color: #dcebfb; font-weight: 700; }

      .note {
        position: absolute; left: 96px; right: 96px; top: 1420px; z-index: 2;
        font-size: 30px; font-weight: 400; line-height: 1.45; color: #7f93ab;
        opacity: 0; animation: fadeUp 0.8s ease-out 1.35s forwards;
      }

      @keyframes fadeUp { 0% { opacity: 0; transform: translateY(24px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="6"
      data-width="1080"
      data-height="1920"
      data-composition-variables='{"kicker":"THEO SỐ LIỆU","title":"Nhanh hơn hẳn","accent":"khi đo thật","unit":"","items":[{"label":"Cách cũ","value":"38"},{"label":"Tool A","value":"52"},{"label":"Cách này","value":"91","hl":true},{"label":"Tool B","value":"60"}],"note":"Đo trên cùng một tác vụ, điểm càng cao càng tốt."}'
    >
      <div class="head">
        <div class="kicker"></div>
        <div class="title"></div>
      </div>
      <div class="plot"></div>
      <div class="baseline"></div>
      <div class="cats"></div>
      <div class="note"></div>
    </div>

    <script>
      (function () {
        var v =
          window.__hyperframes &&
          typeof window.__hyperframes.getVariables === "function"
            ? window.__hyperframes.getVariables()
            : {};
        var set = function (sel, text) {
          var el = document.querySelector(sel);
          if (el && text != null) el.textContent = String(text).normalize("NFC");
        };
        set(".kicker", v.kicker);
        set(".note", v.note);

        // Title + optional trailing accent phrase on its own coloured run.
        var titleEl = document.querySelector(".title");
        if (titleEl) {
          var t = v.title != null ? String(v.title).normalize("NFC") : "";
          var acc = v.accent != null ? String(v.accent).normalize("NFC") : "";
          titleEl.textContent = "";
          titleEl.appendChild(document.createTextNode(acc ? t + " " : t));
          if (acc) {
            var s = document.createElement("span");
            s.className = "accent"; s.textContent = acc;
            titleEl.appendChild(s);
          }
        }

        var items = Array.isArray(v.items) ? v.items.slice(0, 6) : [];
        var unit = v.unit != null ? String(v.unit) : "";
        var vals = items.map(function (it) { return parseFloat(String((it && it.value) || 0).replace(/,/g, "")) || 0; });
        var max = Math.max.apply(null, vals.concat([1]));

        var plot = document.querySelector(".plot");
        var cats = document.querySelector(".cats");
        items.forEach(function (it, i) {
          it = it || {};
          var hl = !!it.hl;
          var pct = Math.max(6, Math.round((vals[i] / max) * 100));

          var col = document.createElement("div");
          col.className = "col" + (hl ? " hl" : "");
          var val = document.createElement("div");
          val.className = "val num";
          val.textContent = (it.value != null ? String(it.value) : "") + unit;
          var bar = document.createElement("div");
          bar.className = "bar";
          bar.style.height = pct + "%";
          bar.style.animationDelay = (0.55 + i * 0.08) + "s";
          col.appendChild(val); col.appendChild(bar);
          plot.appendChild(col);

          var cat = document.createElement("div");
          cat.className = "cat" + (hl ? " hl" : "");
          cat.textContent = it.label != null ? String(it.label).normalize("NFC") : "";
          cat.style.animationDelay = (1.1 + i * 0.06) + "s";
          cats.appendChild(cat);
        });
      })();
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = {
        pause: function () {}, seek: function () {}, paused: function () { return true; },
      };
    </script>
  </body>
</html>
